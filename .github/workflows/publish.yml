name: Publish Extension

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as Marketplace pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Publish To Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate VSCE token secret
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT repository secret"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify PAT can publish for configured publisher
        run: |
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          npx vsce verify-pat "$PUBLISHER" -p "${{ secrets.VSCE_PAT }}"

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Publish to Visual Studio Marketplace
        run: |
          set +e

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PUBLISH_OUTPUT="$(npx vsce publish --pre-release --skip-duplicate -p "${{ secrets.VSCE_PAT }}" 2>&1)"
            PUBLISH_STATUS=$?
          else
            PUBLISH_OUTPUT="$(npx vsce publish --skip-duplicate -p "${{ secrets.VSCE_PAT }}" 2>&1)"
            PUBLISH_STATUS=$?
          fi

          printf '%s\n' "$PUBLISH_OUTPUT"

          if [ "$PUBLISH_STATUS" -ne 0 ]; then
            if printf '%s\n' "$PUBLISH_OUTPUT" | grep -Fq "Make changes to, share, or view certificate of an existing extension"; then
              echo "Detected extension certificate permission failure."
              echo "Most common cause: VSCE_PAT was created under a different Microsoft identity than the account that originally published this extension."
              echo "Fix by creating VSCE_PAT from the original publisher identity and updating the repository secret."
            fi

            exit "$PUBLISH_STATUS"
          fi
