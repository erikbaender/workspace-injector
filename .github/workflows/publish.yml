name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Publish To Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate VSCE token secret
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT repository secret"
            exit 1
          fi

      - name: Validate release tag matches package version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag ($TAG_NAME) must match package.json version (v$PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish -p "${{ secrets.VSCE_PAT }}"
