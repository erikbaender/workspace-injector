name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Publish To Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate VSCE token secret
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT repository secret"
            exit 1
          fi

      - name: Resolve release version from tag
        id: release_version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Release tag ($TAG_NAME) must use format v<major>.<minor>.<patch>, for example v0.0.2."
            exit 1
          fi

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version from release tag
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          TARGET_VERSION="${{ steps.release_version.outputs.version }}"

          if [ "$CURRENT_VERSION" = "$TARGET_VERSION" ]; then
            echo "package.json already matches release version $TARGET_VERSION."
            exit 0
          fi

          npm version "${{ steps.release_version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Verify PAT can publish for configured publisher
        run: |
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          npx vsce verify-pat "$PUBLISHER" -p "${{ secrets.VSCE_PAT }}"

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Publish to Visual Studio Marketplace
        run: |
          set +e

          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            PUBLISH_OUTPUT="$(npx vsce publish --pre-release --skip-duplicate -p "${{ secrets.VSCE_PAT }}" 2>&1)"
            PUBLISH_STATUS=$?
          else
            PUBLISH_OUTPUT="$(npx vsce publish --skip-duplicate -p "${{ secrets.VSCE_PAT }}" 2>&1)"
            PUBLISH_STATUS=$?
          fi

          printf '%s\n' "$PUBLISH_OUTPUT"

          if [ "$PUBLISH_STATUS" -ne 0 ]; then
            if printf '%s\n' "$PUBLISH_OUTPUT" | grep -Fq "Make changes to, share, or view certificate of an existing extension"; then
              echo "Detected extension certificate permission failure."
              echo "Most common cause: VSCE_PAT was created under a different Microsoft identity than the account that originally published this extension."
              echo "Fix by creating VSCE_PAT from the original publisher identity and updating the repository secret."
            fi

            exit "$PUBLISH_STATUS"
          fi

      - name: Commit synced version files
        continue-on-error: true
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "Version files already match release tag."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore: sync version to ${{ steps.release_version.outputs.version }} from release ${{ steps.release_version.outputs.tag }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
